<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>غير متصل - نورس بيتزا</title>
<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#c8341f" />
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Tajawal", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #fbf6ec;
    color: #2a1a10;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: #fff;
    border: 1px solid #ecdfc9;
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
  }
  img { width: 96px; height: 96px; border-radius: 22px; }
  h1 { font-size: 22px; margin: 16px 0 6px; color: #c8341f; }
  p { margin: 0 0 20px; color: #6b5c4d; line-height: 1.7; font-size: 15px; }
  button {
    background: #c8341f; color: #fff; border: 0; border-radius: 999px;
    padding: 12px 28px; font-size: 16px; font-weight: 700; cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #a72a19; }
</style>
</head>
<body>
  <div class="card">
    <img src="/nawras-icon-192.png" alt="نورس بيتزا" />
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>لا يمكن تحميل الصفحة الآن. تحقق من اتصالك ثم حاول مرة أخرى.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
